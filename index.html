<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CouchView</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: linear-gradient(160deg, #0a0a0f 0%, #12101f 40%, #1a0e2e 100%);
    color: #e8e4f0; min-height: 100vh; overflow: hidden;
  }

  /* ===== LOBBY ===== */
  #lobby {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 20px;
  }
  .lobby-box { width: 100%; max-width: 460px; text-align: center; }
  .logo-row { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .logo-icon {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, #ff4d6a, #c34cff);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 0 30px rgba(195,76,255,0.3);
  }
  .logo-text {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(90deg, #ff4d6a, #c34cff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lobby-sub { color: #8a819e; font-size: 15px; letter-spacing: 0.3px; margin-bottom: 36px; }

  .input-field {
    width: 100%; padding: 14px 18px; border-radius: 12px;
    border: 1px solid #2d2744; background: rgba(255,255,255,0.04);
    color: #e8e4f0; font-size: 16px; outline: none;
    font-family: inherit; transition: border-color 0.2s;
  }
  .input-field:focus { border-color: #c34cff; }
  .input-field::placeholder { color: #554e6a; }
  .input-field.error { border-color: #ff4d6a; }
  #nicknameInput { text-align: center; letter-spacing: 0.5px; margin-bottom: 28px; }

  .btn-create {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #ff4d6a, #c34cff);
    color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
    letter-spacing: 0.3px; box-shadow: 0 4px 24px rgba(195,76,255,0.25);
    transition: opacity 0.2s; font-family: inherit; margin-bottom: 20px;
  }
  .btn-create:hover { opacity: 0.9; }

  .divider { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .divider-line { flex: 1; height: 1px; background: #2d2744; }
  .divider-text { color: #554e6a; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }
  .join-row { display: flex; gap: 10px; }
  #joinCodeInput { flex: 1; text-align: center; letter-spacing: 4px; font-weight: 600; }
  .btn-join {
    padding: 14px 28px; border-radius: 12px; border: 1px solid #c34cff;
    background: transparent; color: #c34cff; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .btn-join:hover { background: rgba(195,76,255,0.1); }

  .status-msg {
    margin-top: 18px; font-size: 13px; color: #8a819e;
    min-height: 20px; transition: color 0.2s;
  }
  .status-msg.error { color: #ff4d6a; }
  .status-msg.ok { color: #4dff8f; }

  /* ===== ROOM ===== */
  #room { display: none; flex-direction: column; height: 100vh; }
  .room-header {
    padding: 12px 20px; border-bottom: 1px solid #1e1a2e;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,15,0.95); flex-shrink: 0; flex-wrap: wrap; gap: 8px;
  }
  .room-header-left { display: flex; align-items: center; gap: 10px; }
  .room-logo-sm {
    width: 32px; height: 32px; border-radius: 10px;
    background: linear-gradient(135deg, #ff4d6a, #c34cff);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .room-logo-text {
    font-size: 16px; font-weight: 700;
    background: linear-gradient(90deg, #ff4d6a, #c34cff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .room-header-right { display: flex; align-items: center; gap: 16px; }

  .conn-status { display: flex; align-items: center; gap: 6px; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4d6a; }
  .conn-dot.connected { background: #4dff8f; box-shadow: 0 0 8px rgba(77,255,143,0.4); }
  .conn-label { font-size: 12px; color: #8a819e; }

  .sync-badge {
    font-size: 11px; color: #c34cff;
    background: rgba(195,76,255,0.1); padding: 4px 10px;
    border-radius: 20px; font-weight: 600; display: none;
  }
  .sync-badge.active { display: inline-block; }

  .room-code {
    background: rgba(195,76,255,0.1); border: 1px solid #2d2744;
    padding: 6px 14px; border-radius: 8px; font-size: 14px;
    font-weight: 700; letter-spacing: 2px; color: #c34cff; cursor: pointer;
    user-select: all;
  }
  .room-code:hover { background: rgba(195,76,255,0.18); }

  .room-body { flex: 1; display: flex; overflow: hidden; }
  .video-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .url-bar { padding: 12px 20px; display: flex; gap: 10px; border-bottom: 1px solid #1e1a2e; }
  #videoUrlInput { flex: 1; padding: 10px 16px; border-radius: 10px; font-size: 14px; }
  .btn-load {
    padding: 10px 22px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, #ff4d6a, #c34cff);
    color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; font-family: inherit;
  }

  .player-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #000; position: relative; flex-direction: column;
  }
  .player-placeholder { text-align: center; color: #554e6a; }
  .player-placeholder .emoji { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
  .player-placeholder p { font-size: 16px; }
  .player-placeholder .sub { font-size: 13px; margin-top: 8px; color: #3d3656; }

  .player-wrapper {
    flex: 1; width: 100%; position: relative; display: none;
  }

  .join-overlay {
    position: absolute; inset: 0; z-index: 10;
    background: #000;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  .join-overlay.active { display: flex; }
  .join-spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid #2d2744; border-top-color: #c34cff;
    animation: spin 0.8s linear infinite;
  }
  .join-overlay-text { font-size: 14px; color: #8a819e; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== CUSTOM CONTROLS ===== */
  .custom-controls {
    display: none;
    width: 100%; padding: 8px 16px;
    background: rgba(10, 10, 15, 0.9);
    border-top: 1px solid #1e1a2e;
    flex-shrink: 0;
    gap: 12px; align-items: center;
  }
  .custom-controls.visible { display: flex; }

  .ctrl-btn {
    background: none; border: none; color: #e8e4f0;
    font-size: 18px; cursor: pointer; padding: 6px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; transition: background 0.15s; flex-shrink: 0;
    width: 36px; height: 36px;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.08); }
  .ctrl-btn:active { background: rgba(255,255,255,0.15); }

  .seek-bar-container {
    flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  .time-label {
    font-size: 11px; color: #8a819e; font-variant-numeric: tabular-nums;
    flex-shrink: 0; min-width: 36px;
  }

  .seek-bar, .volume-slider {
    -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; outline: none; cursor: pointer;
    background: #2d2744;
  }
  .seek-bar { flex: 1; min-width: 0; }
  .volume-slider { width: 80px; flex-shrink: 0; }

  .seek-bar::-webkit-slider-thumb, .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #c34cff; cursor: pointer; border: none;
  }
  .seek-bar::-moz-range-thumb, .volume-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: #c34cff; cursor: pointer; border: none;
  }

  .volume-group {
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }

  /* ===== CHAT ===== */
  .chat-col {
    width: 280px; border-left: 1px solid #1e1a2e;
    display: flex; flex-direction: column;
    background: rgba(10,10,15,0.6); flex-shrink: 0;
  }
  .chat-header {
    padding: 14px 16px; border-bottom: 1px solid #1e1a2e;
    font-size: 13px; font-weight: 600; color: #8a819e;
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-empty { color: #3d3656; font-size: 13px; text-align: center; margin-top: 40px; }
  .chat-msg { padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); }
  .chat-msg.mine { background: rgba(195,76,255,0.1); border-top-right-radius: 2px; }
  .chat-msg:not(.mine) { border-top-left-radius: 2px; }
  .chat-nick { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
  .chat-nick.mine { color: #c34cff; }
  .chat-nick:not(.mine) { color: #ff4d6a; }
  .chat-text { font-size: 13px; line-height: 1.4; color: #ccc; word-break: break-word; }

  /* System messages (join/leave) */
  .chat-system {
    text-align: center; font-size: 11px; color: #554e6a;
    padding: 4px 0; font-style: italic;
  }

  .chat-input-row { padding: 12px 14px; border-top: 1px solid #1e1a2e; display: flex; gap: 8px; }
  #chatInput { flex: 1; padding: 10px 14px; border-radius: 10px; font-size: 13px; }
  .btn-send {
    padding: 10px 14px; border-radius: 10px; border: none;
    background: #2d2744; color: #c34cff; font-size: 16px; cursor: pointer;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulsing { animation: pulse 1.5s ease-in-out infinite; }

  .btn-leave {
    padding: 6px 14px; border-radius: 8px; border: 1px solid #3d3656;
    background: transparent; color: #8a819e; font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
    letter-spacing: 0.3px;
  }
  .btn-leave:hover { border-color: #ff4d6a; color: #ff4d6a; background: rgba(255,77,106,0.07); }

  @media (max-width: 700px) {
    .chat-col { display: none; }
    .volume-group { display: none; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-box">
    <div style="margin-bottom: 40px;">
      <div class="logo-row">
        <div class="logo-icon">▶</div>
        <span class="logo-text">CouchView</span>
      </div>
      <p class="lobby-sub">Sync YouTube videos with friends — no installs, no sign-ups</p>
    </div>
    <input id="nicknameInput" class="input-field" type="text" placeholder="Your nickname" maxlength="16">
    <button class="btn-create" id="btnCreate">Create a Room</button>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or join</span>
      <div class="divider-line"></div>
    </div>
    <div class="join-row">
      <input id="joinCodeInput" class="input-field" type="text" placeholder="Room code" maxlength="12">
      <button class="btn-join" id="btnJoin">Join</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<div id="room">
  <div class="room-header">
    <div class="room-header-left">
      <div class="room-logo-sm">▶</div>
      <span class="room-logo-text">CouchView</span>
    </div>
    <div class="room-header-right">
      <span class="sync-badge" id="syncBadge">⟳ syncing</span>
      <div class="conn-status">
        <span class="conn-dot" id="connDot"></span>
        <span class="conn-label pulsing" id="connLabel">connecting...</span>
      </div>
      <div class="room-code" id="roomCodeDisplay" title="Click to copy room code"></div>
      <button class="btn-leave" id="btnLeave" title="Leave room">Leave</button>
    </div>
  </div>

  <div class="room-body">
    <div class="video-col">
      <div class="url-bar">
        <input id="videoUrlInput" class="input-field" type="text" placeholder="Paste a YouTube URL...">
        <button class="btn-load" id="btnLoad">Load</button>
      </div>
      <div class="player-area">
        <div class="player-placeholder" id="placeholder">
          <div class="emoji">🎬</div>
          <p>Paste a YouTube link above to start watching</p>
          <p class="sub">Both you and your friend can load videos</p>
        </div>
        <div class="player-wrapper" id="playerWrapper">
          <div id="ytPlayerHost" style="width:100%;height:100%;position:absolute;top:0;left:0;"></div>
          <div class="join-overlay" id="joinOverlay">
            <div class="join-spinner"></div>
            <span class="join-overlay-text">Syncing...</span>
          </div>
        </div>
      </div>
      <!-- Custom controls bar -->
      <div class="custom-controls" id="customControls">
        <button class="ctrl-btn" id="ctrlPlayPause" title="Play/Pause">⏵</button>
        <div class="seek-bar-container">
          <span class="time-label" id="ctrlTimeCurrent">0:00</span>
          <input type="range" class="seek-bar" id="ctrlSeek" min="0" max="100" value="0" step="0.5">
          <span class="time-label" id="ctrlTimeDuration">0:00</span>
        </div>
        <div class="volume-group">
          <button class="ctrl-btn" id="ctrlMute" title="Mute/Unmute">🔊</button>
          <input type="range" class="volume-slider" id="ctrlVolume" min="0" max="100" value="100" step="1">
        </div>
      </div>
    </div>

    <div class="chat-col">
      <div class="chat-header">Chat</div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">No messages yet...</div>
      </div>
      <div class="chat-input-row">
        <input id="chatInput" class="input-field" type="text" placeholder="Say something...">
        <button class="btn-send" id="btnSend">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
// ========== STATE ==========
var SYNC_THRESHOLD = 1;  // seconds — seek if drift exceeds this
var PRESENCE_INTERVAL = 5000;
var PRESENCE_TIMEOUT = 14000;
var nickname = "";
var roomCode = "";
var myId = "u" + Math.random().toString(36).slice(2, 10);
var mqttClient = null;
var currentVideoId = null;
var player = null;
var playerReady = false;
var suppressUntil = 0;       // timestamp — suppress outbound state publishes until this moment
var lastSyncTs = 0;          // ts of last applied inbound sync — used to drop stale/out-of-order messages
var awaitingResume = false;  // true while late-joiner waits for its player to buffer before broadcasting resume
var presenceTimer = null;
var resyncTimer = null;      // periodic drift-correction heartbeat
var seekUpdateTimer = null;
var knownPeers = {};
var isSeeking = false;
var lastVolume = 100;
var pendingStateSync = null; // { videoId, time, playing, shouldResume, receivedAt } for late-joiner sync

var BROKERS = [
  "wss://broker.hivemq.com:8884/mqtt",
  "wss://broker.emqx.io:8084/mqtt"
];

function log() {
  var args = Array.prototype.slice.call(arguments);
  args.unshift("[CV]");
  console.log.apply(console, args);
}

// ========== LOAD MQTT.JS ==========
function loadMQTT() {
  return new Promise(function(resolve, reject) {
    if (window.mqtt) return resolve();
    log("Loading MQTT.js...");
    var s = document.createElement("script");
    s.src = "https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js";
    s.onload = function() { log("MQTT.js loaded"); resolve(); };
    s.onerror = function() { reject(new Error("Failed to load MQTT.js")); };
    document.head.appendChild(s);
  });
}

// ========== HELPERS ==========
function extractVideoId(url) {
  if (!url) return null;
  var patterns = [
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (var i = 0; i < patterns.length; i++) {
    var m = url.match(patterns[i]);
    if (m) return m[1];
  }
  return null;
}

function genCode() {
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  var s = "";
  for (var i = 0; i < 5; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function fmtTime(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  sec = Math.floor(sec);
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return m + ":" + (s < 10 ? "0" : "") + s;
}

function setStatus(msg, type) {
  var el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status-msg" + (type ? " " + type : "");
  log("Status:", msg);
}

function setConnected(connected, label) {
  document.getElementById("connDot").className = "conn-dot" + (connected ? " connected" : "");
  var lbl = document.getElementById("connLabel");
  lbl.textContent = label || (connected ? "connected" : "connecting...");
  lbl.classList.toggle("pulsing", !connected);
}

function flashError(inputId) {
  var el = document.getElementById(inputId);
  el.classList.add("error");
  el.focus();
  setTimeout(function() { el.classList.remove("error"); }, 2000);
}

// Suppress outbound state-change publishes for `ms` milliseconds.
// Simple overwrite — do NOT use Math.max here. Rapid spam must not compound
// the window; each sync gets its own fresh window so the next event can fire.
function suppress(ms) {
  suppressUntil = Date.now() + ms;
}
function suppressed() {
  return Date.now() < suppressUntil;
}

function leaveRoom() {
  // Announce departure before disconnecting
  if (mqttClient && mqttClient.connected) {
    publish("presence", { nick: nickname, event: "leave" });
  }

  // Stop timers
  if (presenceTimer) { clearInterval(presenceTimer); presenceTimer = null; }
  if (seekUpdateTimer) { clearInterval(seekUpdateTimer); seekUpdateTimer = null; }
  if (resyncTimer) { clearInterval(resyncTimer); resyncTimer = null; }
  suppressUntil = 0;

  // Disconnect MQTT
  if (mqttClient) { try { mqttClient.end(true); } catch(e) {} mqttClient = null; }

  // Reset player state
  playerReady = false;
  player = null;
  currentVideoId = null;
  pendingStateSync = null;
  knownPeers = {};
  suppressUntil = 0;
  lastSyncTs = 0;
  awaitingResume = false;
  roomCode = "";

  // Reset player UI
  var host = document.getElementById("ytPlayerHost");
  if (host) host.innerHTML = "";
  document.getElementById("joinOverlay").classList.remove("active");
  document.getElementById("playerWrapper").style.display = "none";
  document.getElementById("customControls").classList.remove("visible");
  document.getElementById("placeholder").style.display = "";
  document.getElementById("videoUrlInput").value = "";

  // Reset chat
  document.getElementById("chatMessages").innerHTML = '<div class="chat-empty" id="chatEmpty">No messages yet...</div>';

  // Back to lobby
  document.getElementById("room").style.display = "none";
  document.getElementById("lobby").style.display = "flex";
  document.getElementById("statusMsg").textContent = "";
  setConnected(false, "connecting...");
  log("Left room");
}

// ========== MQTT ==========
function topicPath(sub) {
  return "couchview/" + roomCode + "/" + sub;
}

function publish(sub, data, retain) {
  if (!mqttClient || !mqttClient.connected) return;
  data.from = myId;
  data.ts = Date.now();
  mqttClient.publish(topicPath(sub), JSON.stringify(data), { qos: 0, retain: !!retain });
}

function connectToBroker(brokerIndex) {
  if (brokerIndex >= BROKERS.length) {
    setStatus("Could not connect to any message broker. Try refreshing.", "error");
    return;
  }

  var url = BROKERS[brokerIndex];
  log("Connecting to broker:", url);
  setStatus("Connecting to server (" + (brokerIndex + 1) + "/" + BROKERS.length + ")...");

  var clientId = "cv_" + myId + "_" + Math.random().toString(36).slice(2, 6);

  mqttClient = mqtt.connect(url, {
    clientId: clientId,
    clean: true,
    connectTimeout: 8000,
    reconnectPeriod: 3000,
    keepalive: 30
  });

  var connectTimeout = setTimeout(function() {
    log("Broker timeout, trying next...");
    mqttClient.end(true);
    connectToBroker(brokerIndex + 1);
  }, 10000);

  mqttClient.on("connect", function() {
    clearTimeout(connectTimeout);
    log("Connected to broker:", url);
    setConnected(true, "connected to room");

    var topics = [
      topicPath("sync"),
      topicPath("video"),
      topicPath("chat"),
      topicPath("presence"),
      topicPath("state-request"),
      topicPath("state-response")
    ];
    mqttClient.subscribe(topics, { qos: 0 }, function(err) {
      if (!err) log("Subscribed to room topics");
    });

    if (document.getElementById("lobby").style.display !== "none") {
      enterRoom();
    }

    // Announce join
    publish("presence", { nick: nickname, event: "join" });
    publishPresence();
    presenceTimer = setInterval(publishPresence, PRESENCE_INTERVAL);

    // Request current state from others (for late joiners)
    setTimeout(function() {
      if (!currentVideoId) {
        log("Requesting room state (late joiner)...");
        publish("state-request", { nick: nickname });
      }
    }, 800);
  });

  mqttClient.on("message", function(t, payload) {
    try {
      var data = JSON.parse(payload.toString());
      if (data.from === myId) return;
      handleMessage(t, data);
    } catch (e) { log("Parse error:", e); }
  });

  mqttClient.on("error", function(err) { log("MQTT error:", err.message || err); });
  mqttClient.on("close", function() { setConnected(false, "reconnecting..."); });
  mqttClient.on("reconnect", function() { log("MQTT reconnecting..."); });
  mqttClient.on("offline", function() { setConnected(false, "offline"); });
}

function handleMessage(t, data) {
  var sub = t.replace("couchview/" + roomCode + "/", "");

  switch (sub) {
    case "sync":
      // Drop out-of-order / stale messages (QoS 0 gives no ordering guarantee)
      if (data.ts && data.ts < lastSyncTs) {
        log("Dropping stale sync:", data.action, "(ts", data.ts, "< last", lastSyncTs + ")");
        break;
      }
      if (data.ts) lastSyncTs = data.ts;
      applySync(data.action, data.time);
      break;
    case "video":
      if (data.videoId && data.videoId !== currentVideoId) {
        lastSyncTs = 0; // new video — reset stale filter
        loadVideoById(data.videoId);
      }
      break;
    case "chat":
      addMessage(data.nick, data.text, false);
      break;
    case "presence":
      handlePresence(data);
      break;
    case "state-request":
      // Someone is asking for current state — respond if we have a video
      if (currentVideoId && player && playerReady) {
        var st = 0;
        try { st = player.getPlayerState(); } catch(e) {}
        publish("state-response", {
          videoId: currentVideoId,
          time: player.getCurrentTime(),
          playing: st === YT.PlayerState.PLAYING,
          nick: nickname
        });
        log("Sent state response to", data.nick);
      }
      break;
    case "state-response":
      // Late joiner receives current state.
      // If video was playing: pause everyone, load, then broadcast resume when buffered.
      if (!currentVideoId && data.videoId) {
        log("Got state from", data.nick, "- video:", data.videoId, "time:", data.time, "playing:", data.playing);
        var shouldResume = !!data.playing;
        pendingStateSync = {
          videoId: data.videoId,
          time: data.time,
          playing: shouldResume,
          shouldResume: shouldResume,
          receivedAt: Date.now()
        };
        currentVideoId = data.videoId;

        if (shouldResume) {
          // Pause everyone so they wait while we buffer
          publish("sync", { action: "pause", time: data.time });
          addSystemMessage("⏸ Syncing " + nickname + " — resuming shortly...");
        }

        // Iframe always activates (autoplay:1); onReady seeks/pauses as needed
        initPlayer(data.videoId, data.time);
      }
      break;
  }
}

// ========== PRESENCE ==========
function publishPresence() {
  publish("presence", { nick: nickname, event: "ping" });
}

function handlePresence(data) {
  var isNew = !knownPeers[data.from];
  knownPeers[data.from] = { nick: data.nick, ts: Date.now() };

  // Show join message in chat
  if (isNew || data.event === "join") {
    addSystemMessage(data.nick + " joined the room");
  }

  updatePeerDisplay();
}

function checkStalePresence() {
  var now = Date.now();
  for (var id in knownPeers) {
    if (now - knownPeers[id].ts > PRESENCE_TIMEOUT) {
      addSystemMessage(knownPeers[id].nick + " left the room");
      delete knownPeers[id];
    }
  }
  updatePeerDisplay();
}

function updatePeerDisplay() {
  var names = [];
  for (var id in knownPeers) {
    names.push(knownPeers[id].nick);
  }
  if (names.length > 0) {
    setConnected(true, names.join(", ") + " in room");
  } else {
    setConnected(true, "waiting for friend...");
  }
}

// Check for stale peers every 6 seconds
setInterval(checkStalePresence, 6000);

// ========== LOBBY ==========
document.getElementById("btnCreate").addEventListener("click", function() {
  nickname = document.getElementById("nicknameInput").value.trim();
  if (!nickname) {
    setStatus("Please enter a nickname first", "error");
    flashError("nicknameInput");
    return;
  }
  roomCode = genCode();
  log("Creating room:", roomCode);
  startConnection();
});

document.getElementById("btnJoin").addEventListener("click", function() {
  nickname = document.getElementById("nicknameInput").value.trim();
  var code = document.getElementById("joinCodeInput").value.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");

  if (!nickname) {
    setStatus("Please enter a nickname first", "error");
    flashError("nicknameInput");
    return;
  }
  if (!code) {
    setStatus("Please enter a room code", "error");
    flashError("joinCodeInput");
    return;
  }

  roomCode = code;
  log("Joining room:", roomCode, "as:", nickname);
  startConnection();
});

function startConnection() {
  setStatus("Loading...");
  loadMQTT().then(function() {
    connectToBroker(0);
  }).catch(function(e) {
    setStatus("Failed to load messaging library.", "error");
  });
}

function enterRoom() {
  document.getElementById("lobby").style.display = "none";
  document.getElementById("room").style.display = "flex";
  document.getElementById("roomCodeDisplay").textContent = roomCode;
  addSystemMessage("You joined the room as " + nickname);
  log("Entered room:", roomCode);
}

document.getElementById("roomCodeDisplay").addEventListener("click", function() {
  try { navigator.clipboard.writeText(roomCode); } catch(e) {}
  this.textContent = "copied!";
  var self = this;
  setTimeout(function() { self.textContent = roomCode; }, 1200);
});

document.getElementById("btnLeave").addEventListener("click", function() {
  if (confirm("Leave the room?")) leaveRoom();
});

// ========== YOUTUBE ==========
function loadYTAPI() {
  return new Promise(function(resolve) {
    if (window.YT && window.YT.Player) return resolve();
    log("Loading YouTube API...");
    var tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);
    window.onYouTubeIframeAPIReady = function() {
      log("YouTube API ready");
      resolve();
    };
  });
}

function initPlayer(videoId, startTime) {
  log("initPlayer:", videoId, "startAt:", startTime);
  loadYTAPI().then(function() {
    playerReady = false;
    var host = document.getElementById("ytPlayerHost");
    host.innerHTML = '<div id="ytplayer" style="width:100%;height:100%;"></div>';
    document.getElementById("placeholder").style.display = "none";
    document.getElementById("playerWrapper").style.display = "block";
    document.getElementById("customControls").classList.add("visible");

    var startSec = Math.floor(startTime || 0);
    var origin = window.location.protocol === "file:" ? "https://www.youtube.com" : window.location.origin;

    player = new YT.Player("ytplayer", {
      width: "100%",
      height: "100%",
      videoId: videoId,
      playerVars: {
        autoplay: 1,           // always activate the iframe UI; onReady pauses if not wanted
        controls: 1,
        playsinline: 1,
        modestbranding: 1,
        rel: 0,
        enablejsapi: 1,
        origin: origin,
        start: startSec
      },
      events: {
        onReady: function() {
          playerReady = true;
          log("Player ready");
          startSeekUpdater();
          startResyncHeartbeat();

          if (pendingStateSync) {
            // Drift-correct: compensate for time the player took to load
            var elapsed = (Date.now() - pendingStateSync.receivedAt) / 1000;
            var targetTime = pendingStateSync.time + (pendingStateSync.playing ? elapsed : 0);
            log("Late-join target:", targetTime.toFixed(1), "(elapsed:", elapsed.toFixed(1), "s)");

            suppress(8000); // block outbound during entire seek→buffer→PLAYING chain

            if (pendingStateSync.shouldResume) {
              // Cover the player while buffering so user never sees the paused frame
              document.getElementById("joinOverlay").classList.add("active");
              // Set flag so onStateChange broadcasts resume once actually buffered
              awaitingResume = true;
              player.seekTo(targetTime, true);
              player.playVideo(); // starts buffering; PLAYING fires when buffer is ready
            } else {
              player.seekTo(targetTime, true);
              player.pauseVideo();
            }
            pendingStateSync = null;
          }

          try {
            var vol = player.getVolume();
            document.getElementById("ctrlVolume").value = vol;
            lastVolume = vol;
          } catch(e) {}
        },
        onStateChange: function(e) {
          updatePlayPauseBtn();

          // Late-join resume: PLAYING fired because our buffer is ready — tell everyone to resume
          if (awaitingResume && e.data === YT.PlayerState.PLAYING) {
            awaitingResume = false;
            document.getElementById("joinOverlay").classList.remove("active");
            var resumeAt = player.getCurrentTime();
            log("Late-join buffered — broadcasting resume at", resumeAt.toFixed(1));
            addSystemMessage("▶ All synced — resuming");
            publish("sync", { action: "play", time: resumeAt });
            return;
          }

          // Block outbound echoes of syncs we applied from others
          if (suppressed()) return;

          if (e.data === YT.PlayerState.PLAYING) {
            publish("sync", { action: "play", time: player.getCurrentTime() });
          } else if (e.data === YT.PlayerState.PAUSED) {
            publish("sync", { action: "pause", time: player.getCurrentTime() });
          } else if (e.data === YT.PlayerState.ENDED) {
            publish("sync", { action: "pause", time: player.getDuration() });
            addSystemMessage("📺 Video ended");
            document.getElementById("playerWrapper").style.display = "none";
            document.getElementById("customControls").classList.remove("visible");
            document.getElementById("placeholder").style.display = "";
            playerReady = false;
            currentVideoId = null;
          }
        },
        onError: function(e) {
          log("YouTube error:", e.data);
          if (e.data === 150 || e.data === 101) {
            addSystemMessage("This video cannot be embedded. Try a different video.");
          }
        }
      }
    });
  });
}

function applySync(action, time) {
  if (!player || !playerReady) return;

  document.getElementById("syncBadge").classList.add("active");
  setTimeout(function() { document.getElementById("syncBadge").classList.remove("active"); }, 600);

  var drift = Math.abs(player.getCurrentTime() - time);
  log("Sync:", action, "t:", time.toFixed(1), "drift:", drift.toFixed(1));

  if (action === "play") {
    if (drift > SYNC_THRESHOLD) {
      suppress(2500); // seek triggers buffering — need longer window for PLAYING to re-fire
      player.seekTo(time, true);
    } else {
      suppress(400);  // no seek, no buffering — just block the immediate echo
    }
    player.playVideo();
  } else if (action === "pause") {
    // Always snap to exact timestamp on pause — no threshold.
    // drift of even 0.5s is visible as a jump when both users compare their screens.
    suppress(400);
    player.pauseVideo();
    player.seekTo(time, true);
  } else if (action === "seek") {
    if (drift > SYNC_THRESHOLD) {
      suppress(2500);
      player.seekTo(time, true);
    }
  }
}

function loadVideoById(videoId) {
  currentVideoId = videoId;
  initPlayer(videoId, 0);
}

document.getElementById("btnLoad").addEventListener("click", loadVideo);
document.getElementById("videoUrlInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") loadVideo();
});

function loadVideo() {
  var videoId = extractVideoId(document.getElementById("videoUrlInput").value);
  if (!videoId) { log("Invalid YouTube URL"); return; }
  currentVideoId = videoId;
  lastSyncTs = 0;      // new video — stale filter reset
  awaitingResume = false;
  document.getElementById("videoUrlInput").value = "";
  initPlayer(videoId, 0);
  // Publish with retain so late joiners also get it
  publish("video", { videoId: videoId }, true);
}

// ========== CUSTOM CONTROLS ==========
function updatePlayPauseBtn() {
  if (!player || !playerReady) return;
  try {
    var st = player.getPlayerState();
    document.getElementById("ctrlPlayPause").textContent = (st === YT.PlayerState.PLAYING) ? "⏸" : "⏵";
  } catch(e) {}
}

// Play/Pause — clicking this triggers onStateChange which publishes. No double-publish.
document.getElementById("ctrlPlayPause").addEventListener("click", function() {
  if (!player || !playerReady) return;
  try {
    var st = player.getPlayerState();
    if (st === YT.PlayerState.PLAYING) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  } catch(e) { log("Play/pause error:", e); }
});

// Seek bar
var seekBar = document.getElementById("ctrlSeek");
seekBar.addEventListener("input", function() {
  isSeeking = true;
  if (!player || !playerReady) return;
  try {
    var duration = player.getDuration();
    var t = (parseFloat(this.value) / 100) * duration;
    document.getElementById("ctrlTimeCurrent").textContent = fmtTime(t);
  } catch(e) {}
});

seekBar.addEventListener("change", function() {
  if (!player || !playerReady) return;
  try {
    var duration = player.getDuration();
    var t = (parseFloat(this.value) / 100) * duration;
    suppress(2000); // prevent the PAUSED+PLAYING sequence from scrub flooding network
    player.seekTo(t, true);
    publish("sync", { action: "seek", time: t });
  } catch(e) {}
  isSeeking = false;
});

// Volume
document.getElementById("ctrlVolume").addEventListener("input", function() {
  if (!player || !playerReady) return;
  try {
    var vol = parseInt(this.value);
    player.setVolume(vol);
    lastVolume = vol;
    document.getElementById("ctrlMute").textContent = vol === 0 ? "🔇" : vol < 50 ? "🔉" : "🔊";
    if (vol > 0) player.unMute();
  } catch(e) {}
});

// Mute toggle
document.getElementById("ctrlMute").addEventListener("click", function() {
  if (!player || !playerReady) return;
  try {
    if (player.isMuted()) {
      player.unMute();
      player.setVolume(lastVolume || 100);
      document.getElementById("ctrlVolume").value = lastVolume || 100;
      this.textContent = "🔊";
    } else {
      player.mute();
      document.getElementById("ctrlVolume").value = 0;
      this.textContent = "🔇";
    }
  } catch(e) {}
});

// Update seek bar periodically
function startSeekUpdater() {
  if (seekUpdateTimer) clearInterval(seekUpdateTimer);
  seekUpdateTimer = setInterval(function() {
    if (!player || !playerReady || isSeeking) return;
    try {
      var cur = player.getCurrentTime();
      var dur = player.getDuration();
      if (dur > 0) {
        seekBar.value = (cur / dur) * 100;
        document.getElementById("ctrlTimeCurrent").textContent = fmtTime(cur);
        document.getElementById("ctrlTimeDuration").textContent = fmtTime(dur);
      }
    } catch(e) {}
  }, 500);
}

// Periodic drift-correction heartbeat — every 30s while playing,
// publish current time as a "seek" so peers can self-correct silently.
// applySync("seek") only re-seeks if drift > SYNC_THRESHOLD, so it's a no-op
// for peers that are already tight.
function startResyncHeartbeat() {
  if (resyncTimer) clearInterval(resyncTimer);
  resyncTimer = setInterval(function() {
    if (!player || !playerReady) return;
    try {
      if (player.getPlayerState() === YT.PlayerState.PLAYING) {
        publish("sync", { action: "seek", time: player.getCurrentTime() });
        log("Heartbeat resync at:", player.getCurrentTime().toFixed(1));
      }
    } catch(e) {}
  }, 30000);
}

// ========== CHAT ==========
document.getElementById("btnSend").addEventListener("click", sendChat);
document.getElementById("chatInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendChat();
});

function sendChat() {
  var text = document.getElementById("chatInput").value.trim();
  if (!text) return;
  document.getElementById("chatInput").value = "";
  addMessage(nickname, text, true);
  publish("chat", { nick: nickname, text: text });
}

function addMessage(nick, text, mine) {
  document.getElementById("chatEmpty").style.display = "none";
  var div = document.createElement("div");
  div.className = "chat-msg" + (mine ? " mine" : "");
  div.innerHTML =
    '<div class="chat-nick ' + (mine ? "mine" : "") + '">' + esc(nick) + '</div>' +
    '<div class="chat-text">' + esc(text) + '</div>';
  var container = document.getElementById("chatMessages");
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addSystemMessage(text) {
  document.getElementById("chatEmpty").style.display = "none";
  var div = document.createElement("div");
  div.className = "chat-system";
  div.textContent = text;
  var container = document.getElementById("chatMessages");
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

log("CouchView loaded");
</script>
